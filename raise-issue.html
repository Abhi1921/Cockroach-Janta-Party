  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "File a Public Issue — Cockroach Janta Party",
    "url": "https://cockrochjantapartycjp.com/raise-issue.html",
    "description": "Public issue intake portal for campus and civic complaints."
  }

<body data-page="raise-issue">
  <div id="site-top"></div>
  <main id="main">
    <section class="page">
      <div class="center-hero">
        <p class="eyebrow">Report · Name · Fix</p>
        <h1>Raise the <em>signal.</em></h1>
      </div>
      <div class="issue-gate">
        <span class="tag">Members first</span>
        <h2>Join before you file</h2>
        <p>Issues stay public and trackable. Membership is free — it keeps spam out and accountability in.</p>
        <label class="check-row" style="text-align:left;margin-top:1.4rem"><input type="checkbox" id="termsCheck"><span>I agree to <a href="terms.html">Terms</a> &amp; <a href="terms.html#satire">Satire</a>.</span></label>
        <button type="button" class="btn btn-google btn-wide" id="googleJoin">Continue with Google (demo)</button>
        <p style="margin:1.1rem 0 0;font-size:0.9rem;color:var(--muted)">Or <a href="join.html" style="color:var(--mint);text-decoration:underline">complete membership</a>.</p>
      </div>
      <form class="form-card" style="margin:2.2rem auto;max-width:640px" id="issueForm">
        <h2 style="font-family:var(--font-display);font-size:1.3rem">Demo issue form</h2>
        <p style="color:var(--muted);font-size:0.9rem">Saved locally in this browser for the demo.</p>
        <div class="field"><label for="title">Title *</label><input id="title" name="title" required placeholder="What’s broken?"></div>
        <div class="field"><label for="category">Category</label><select id="category" name="category"><option>Education</option><option>Jobs</option><option>Governance</option><option>Digital rights</option><option>Other</option></select></div>
        <div class="field"><label for="details">Details *</label><textarea id="details" name="details" rows="5" required placeholder="Names, places, receipts…"></textarea></div>
        <div class="field"><label for="reporter_email">Email *</label><input type="email" id="reporter_email" name="email" required></div>
        <button type="submit" class="btn btn-solid btn-wide">Submit issue →</button>
      </form>
    </section>
  </main>
  <div id="site-bottom"></div>
  <script src="assets/js/site-config.js?v=10.0" defer></script>
  <script src="assets/js/layout.js?v=10.0" defer></script>
  <script src="assets/js/main.js?v=10.0" defer></script>
</body>
</html>
